<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoritmia - Motores Algébricos Essenciais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .metric-card {
            transition: all 0.2s ease-in-out;
        }
        .metric-card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <div class="p-4 md:p-12">
        <header class="max-w-4xl mx-auto mb-16 text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-800 mb-4 tracking-tight">Algoritmia</h1>
            <p class="text-lg text-slate-600 max-w-2xl mx-auto">
                Uma referência técnica de fórmulas matemáticas fundamentais implementadas puramente em <b>JavaScript</b>.
            </p>
        </header>

        <main class="max-w-4xl mx-auto">
            <div id="metrics-container" class="space-y-8"></div>
        </main>

        <footer class="max-w-4xl mx-auto mt-20 mb-10 pt-8 border-t border-slate-200 text-center">
            <p class="text-slate-400 text-sm italic">MathCore.js & JavaScript ES6</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
